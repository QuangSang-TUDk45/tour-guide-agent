<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <style>
      .title { font: 700 24px Arial; fill: #0f172a; }
      .h { font: 700 15px Arial; fill: #1e293b; }
      .t { font: 13px Arial; fill: #334155; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="500" fill="#f8fafc"/>
  <text x="30" y="42" class="title">Hình 2.4 - Kiến trúc triển khai web: Streamlit - FastAPI - Agent - PostgreSQL</text>

  <rect x="40" y="90" width="1120" height="360" rx="14" fill="#ffffff" stroke="#cbd5e1"/>

  <rect x="90" y="180" width="200" height="120" rx="10" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="148" y="220" class="h">Streamlit UI</text>
  <text x="116" y="245" class="t">app.py</text>
  <text x="116" y="267" class="t">chat_input + session_state</text>

  <rect x="360" y="160" width="230" height="160" rx="10" fill="#dcfce7" stroke="#4ade80"/>
  <text x="430" y="198" class="h">FastAPI</text>
  <text x="382" y="223" class="t">POST /api/chat</text>
  <text x="382" y="245" class="t">ChatRequest(BaseModel)</text>
  <text x="382" y="267" class="t">get_context + get_response</text>

  <rect x="660" y="130" width="230" height="220" rx="10" fill="#fee2e2" stroke="#f87171"/>
  <text x="730" y="168" class="h">Agent Layer</text>
  <text x="682" y="193" class="t">Orchestrator Agent</text>
  <text x="682" y="215" class="t">Response Agent</text>
  <text x="682" y="237" class="t">Planning Agent</text>
  <text x="682" y="259" class="t">HF Router API</text>

  <rect x="960" y="130" width="160" height="90" rx="10" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="985" y="168" class="h">PostgreSQL</text>
  <text x="982" y="190" class="t">5 bảng domain</text>

  <rect x="960" y="260" width="160" height="90" rx="10" fill="#ffedd5" stroke="#fb923c"/>
  <text x="996" y="298" class="h">Weather API</text>
  <text x="987" y="320" class="t">Open-Meteo</text>

  <line x1="290" y1="240" x2="360" y2="240" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="590" y1="240" x2="660" y2="240" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="890" y1="190" x2="960" y2="175" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="890" y1="280" x2="960" y2="305" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="660" y1="310" x2="590" y2="290" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="360" y1="290" x2="290" y2="270" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
