<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460">
  <defs>
    <style>
      .title { font: 700 24px Arial; fill: #0f172a; }
      .h { font: 700 15px Arial; fill: #1e293b; }
      .t { font: 13px Arial; fill: #334155; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="460" fill="#f8fafc"/>
  <text x="30" y="40" class="title">Hình 2.6 - Quy trình lexical retrieval với difflib.SequenceMatcher</text>

  <rect x="40" y="80" width="1120" height="340" rx="14" fill="#ffffff" stroke="#cbd5e1"/>

  <rect x="90" y="170" width="180" height="100" rx="10" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="130" y="205" class="h">filter_tags</text>
  <text x="112" y="228" class="t">Chuẩn hoá lowercase</text>
  <text x="120" y="250" class="t">Input truy vấn</text>

  <rect x="340" y="150" width="220" height="140" rx="10" fill="#dcfce7" stroke="#4ade80"/>
  <text x="378" y="182" class="h">Fetch dataset</text>
  <text x="362" y="205" class="t">PostgreSQL (food/restaurant</text>
  <text x="362" y="227" class="t">/destination ...)</text>
  <text x="362" y="249" class="t">lấy cột category/text</text>

  <rect x="620" y="150" width="230" height="140" rx="10" fill="#fee2e2" stroke="#f87171"/>
  <text x="655" y="182" class="h">Similarity scoring</text>
  <text x="645" y="205" class="t">SequenceMatcher.ratio()</text>
  <text x="645" y="227" class="t">score → phần trăm</text>
  <text x="645" y="249" class="t">gắn cột sim_score</text>

  <rect x="910" y="150" width="210" height="140" rx="10" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="960" y="182" class="h">Top-K rank</text>
  <text x="936" y="205" class="t">food: top-5</text>
  <text x="936" y="227" class="t">restaurant: top-10</text>
  <text x="936" y="249" class="t">destination: top-10</text>

  <rect x="460" y="330" width="300" height="58" rx="10" fill="#d1fae5" stroke="#34d399"/>
  <text x="488" y="365" class="h">Context có kiểm chứng đưa vào LLM</text>

  <line x1="270" y1="220" x2="340" y2="220" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="560" y1="220" x2="620" y2="220" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="850" y1="220" x2="910" y2="220" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="1015" y1="290" x2="760" y2="330" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
</svg>
